<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Album Zhafeer 26 - Flipbook</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="turn.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #2c1810;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
/* ── Header ── */
.header {
  width: 100%;
  background: linear-gradient(135deg, #3e2723, #5d4037);
  color: #fff;
  padding: 6px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  flex-shrink: 0;
  gap: 8px;
  min-height: 42px;
}
.header .title {
  font-size: 0.8rem;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.header .mid-group {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 1;
  min-width: 0;
}
.header .mid-group button {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 0.75rem;
  line-height: 1.3;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.header .mid-group button:active { background: rgba(255,255,255,0.25); }
.header .mid-group button:disabled { opacity: 0.25; }
.header .mid-group .page-num {
  display: flex;
  align-items: center;
  gap: 2px;
  color: #d7ccc8;
  font-size: 0.7rem;
  white-space: nowrap;
}
.header .mid-group .page-num input {
  width: 36px;
  padding: 2px;
  border-radius: 3px;
  border: none;
  text-align: center;
  font-size: 0.7rem;
}
.header .right-group {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.header .right-group button {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 4px 6px;
  cursor: pointer;
  font-size: 0.7rem;
  line-height: 1.3;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.header .right-group button:active { background: rgba(255,255,255,0.25); }
.header .right-group .zlabel {
  color: #d7ccc8;
  font-size: 0.65rem;
  min-width: 28px;
  text-align: center;
}
/* ── Book ── */
#flipbook-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  overflow: hidden;
  position: relative;
  transition: transform 0.15s;
  transform-origin: center center;
  touch-action: none;
}
#flipbook-container {
  perspective: 2000px;
  flex-shrink: 0;
}
#flipbook { width: 100%; height: 100%; }
#flipbook .page {
  width: 100%;
  height: 100%;
  background: #fff;
}
#flipbook .page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  pointer-events: none;
}
.cover-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-align: center;
  padding: 30px;
}
/* ── Thumbnail ── */
.thumbnail-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(44,24,16,0.95);
  padding: 5px;
  display: flex;
  gap: 3px;
  overflow-x: auto;
  z-index: 50;
  height: 66px;
  -webkit-overflow-scrolling: touch;
}
.thumbnail-bar img {
  height: 54px;
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 2px;
  opacity: 0.6;
  flex-shrink: 0;
}
.thumbnail-bar img.active {
  border-color: #ff8f00;
  opacity: 1;
}
</style>
</head>
<body>

<div class="header">
  <span class="title">Zhafeer 26</span>
  <div class="mid-group">
    <button id="prevBtn">&lsaquo;</button>
    <span class="page-num">
      <input type="number" id="pageInput" min="1" max="203" value="1">
      /<span id="totalLabel">203</span>
    </span>
    <button id="nextBtn">&rsaquo;</button>
  </div>
  <div class="right-group">
    <button id="zoomOutBtn">A-</button>
    <span class="zlabel" id="zoomLabel">100%</span>
    <button id="zoomInBtn">A+</button>
  </div>
</div>

<div id="flipbook-wrap">
  <div id="flipbook-container">
    <div id="flipbook"></div>
  </div>
</div>

<div class="thumbnail-bar" id="thumbBar"></div>

<script>
var TOTAL_PAGES = 203;
var flipbook = $('#flipbook');
var currentUserPage = 1;
var zoomLevel = 1;
var MIN_ZOOM = 0.2, MAX_ZOOM = 4, ZOOM_STEP = 0.15;

function imgSrc(n) {
  return 'pages/page-' + String(n).padStart(3, '0') + '.jpg';
}

function calcBookSize() {
  var hh = document.querySelector('.header').offsetHeight || 42;
  var th = 66;
  var aw = window.innerWidth - 10;
  var ah = window.innerHeight - hh - th - 10;
  var pr = 842.25 / 595.5;
  var sr = 2 / pr;
  var bw = ah * sr, bh = ah;
  if (bw > aw) { bw = aw; bh = bw / sr; }
  return { width: Math.round(bw), height: Math.round(bh) };
}

function resizeBook() {
  if (!flipbook.data().done) return;
  var s = calcBookSize();
  $('#flipbook-container').css({ width: s.width, height: s.height });
  flipbook.turn('size', s.width, s.height);
}

function build() {
  var h = '';
  h += '<div class="page cover-page" style="background:linear-gradient(135deg,#5d4037,#2c1810)"><div><h2 style="font-size:2rem;margin-bottom:15px">Album Zhafeer 26</h2><p style="opacity:0.8">Album Kenangan</p></div></div>';
  for (var i = 1; i <= TOTAL_PAGES; i++)
    h += '<div class="page"><img src="' + imgSrc(i) + '" alt="Hal ' + i + '"></div>';
  h += '<div class="page cover-page" style="background:linear-gradient(135deg,#2c1810,#5d4037)"><div><h2 style="font-size:2rem;margin-bottom:15px">Album Zhafeer 26</h2><p style="opacity:0.8">Terima Kasih</p></div></div>';
  flipbook.html(h);
}

function initFB() {
  var s = calcBookSize();
  $('#flipbook-container').css({ width: s.width, height: s.height });
  flipbook.turn({
    width: s.width,
    height: s.height,
    autoCenter: true,
    duration: 600,
    gradients: true,
    acceleration: true,
    elevation: 50,
    cornerSize: 0,
    pages: TOTAL_PAGES + 2,
    when: {
      turned: function(e, page) {
        var u = page - 1;
        if (u < 1) u = 1;
        if (u > TOTAL_PAGES) u = TOTAL_PAGES;
        currentUserPage = u;
        $('#pageInput').val(u);
        updateUI(u);
      }
    }
  });

  // Matikan touch bawaan turn.js biar gak konflik
  flipbook.unbind('touchstart');
  $(document).unbind('touchmove').unbind('touchend');

  flipbook.turn('page', 2);
  currentUserPage = 1;
  $('#pageInput').val(1);
  updateUI(1);
}

function updateUI(u) {
  $('#prevBtn').prop('disabled', u <= 1);
  $('#nextBtn').prop('disabled', u >= TOTAL_PAGES);
  $('#thumbBar img').removeClass('active');
  $('#thumbBar img[data-page="' + u + '"]').addClass('active');
  var el = $('#thumbBar img[data-page="' + u + '"]')[0];
  if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function goto(u) {
  if (u < 1) u = 1;
  if (u > TOTAL_PAGES) u = TOTAL_PAGES;
  flipbook.turn('page', u + 1);
}

function applyZoom() {
  zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel));
  $('#flipbook-wrap').css('transform', 'scale(' + zoomLevel + ')');
  $('#zoomLabel').text(Math.round(zoomLevel * 100) + '%');
}
function zoomIn() { zoomLevel += ZOOM_STEP; applyZoom(); }
function zoomOut() { zoomLevel -= ZOOM_STEP; applyZoom(); }

$('#prevBtn').click(function() { goto(currentUserPage - 1); });
$('#nextBtn').click(function() { goto(currentUserPage + 1); });
$('#pageInput').change(function() {
  var v = parseInt($(this).val()) || 1;
  if (v < 1) v = 1;
  if (v > TOTAL_PAGES) v = TOTAL_PAGES;
  goto(v);
});
$('#zoomInBtn').click(zoomIn);
$('#zoomOutBtn').click(zoomOut);

$(document).keydown(function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goto(currentUserPage + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goto(currentUserPage - 1); }
  else if (e.key === 'Home') { e.preventDefault(); goto(1); }
  else if (e.key === 'End') { e.preventDefault(); goto(TOTAL_PAGES); }
  else if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
  else if (e.key === '-') { e.preventDefault(); zoomOut(); }
  else if (e.key === '0') { e.preventDefault(); zoomLevel = 1; applyZoom(); }
});

/* ── Touch sendiri (gak pake turn.js) ── */
var tx = 0, ty = 0, t0 = 0, pinching = false, lastPinch = 0, lastTap = 0;

document.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    t0 = Date.now();
    pinching = false;
  }
  if (e.touches.length === 2) {
    pinching = true;
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinch = Math.sqrt(dx*dx + dy*dy);
  }
});

document.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2 && pinching) {
    e.preventDefault();
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (lastPinch > 0) {
      zoomLevel *= 1 + (d - lastPinch) / lastPinch;
      applyZoom();
    }
    lastPinch = d;
  }
});

document.addEventListener('touchend', function(e) {
  if (e.changedTouches.length === 1 && !pinching) {
    var now = Date.now();
    var dt = now - t0;
    var dx = tx - e.changedTouches[0].clientX;
    var dy = ty - e.changedTouches[0].clientY;
    var adx = Math.abs(dx), ady = Math.abs(dy);

    // Double tap → reset zoom
    if (adx < 25 && ady < 25 && dt < 300) {
      if (now - lastTap < 300) {
        zoomLevel = 1; applyZoom();
        lastTap = 0;
        return;
      }
      lastTap = now;
      return;
    }

    if (adx > ady && adx > 30) {
      // Swipe
      if (dx > 0) goto(currentUserPage + 1);
      else goto(currentUserPage - 1);
    } else if (adx < 20 && ady < 20 && dt < 500) {
      // Tap: kiri = prev, kanan = next
      var x = e.changedTouches[0].clientX;
      var third = window.innerWidth / 3;
      if (x < third) goto(currentUserPage - 1);
      else if (x > third * 2) goto(currentUserPage + 1);
    }
  }
  if (e.touches.length < 2) { pinching = false; lastPinch = 0; }
});

$('#flipbook-wrap').on('wheel', function(e) {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    if (e.originalEvent.deltaY < 0) zoomIn(); else zoomOut();
  }
});

var rt;
$(window).resize(function() {
  clearTimeout(rt);
  rt = setTimeout(function() { resizeBook(); applyZoom(); }, 150);
});

var tb = $('#thumbBar');
for (var i = 1; i <= TOTAL_PAGES; i++)
  tb.append('<img src="' + imgSrc(i) + '" data-page="' + i + '" alt="">');
tb.on('click', 'img', function() { goto(parseInt($(this).data('page'))); });

$('#totalLabel').text(TOTAL_PAGES);
build();
initFB();
</script>
</body>
</html>
